name: CI Sanity

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanity check
        run: |
          echo "CI sanity: repository checked out"
          echo "No strict file checks to avoid false negatives"
          echo "Sanity passed"
