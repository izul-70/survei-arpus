name: PHP CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required application files
        run: |
          test -f README.md
          test -f index.php
          test -f biodata.php
          test -f kuesioner.php
          test -f proses_biodata.php
          test -f proses_survey.php
          test -f config/database.php
          test -f admin/index.php
          test -f admin/login.php
          echo "Required application files verified successfully."
